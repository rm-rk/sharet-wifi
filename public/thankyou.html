<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sharet - Thank You</title>
    <meta name="description" content="Thank you for contributing to the community.">
    <meta name="theme-color" content="#0d0a0e">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body data-page="thankyou">
    <!-- Premium Cyber Background -->
    <div class="bg-cyber">
        <div class="bg-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="scanlines"></div>

    <div class="app-container">
        <div class="thankyou-content">
            <!-- Particle Burst Container -->
            <div class="particle-burst" id="particleBurst"></div>

            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>

            <h1>Thank You!</h1>
            <p class="thankyou-message">
                You&apos;ve contributed to your community.<br>
                Your generosity helps neighbors stay connected.
            </p>

            <div class="redirect-timer">
                <p>Redirecting to community feed in <span id="timer">4</span>s</p>
            </div>

            <a href="home.html" class="btn-primary">Continue to Feed</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
