<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sharet - Unlock Community Access</title>
    <meta name="description" content="Share Wi-Fi. Build Community. Join the movement.">
    <meta name="theme-color" content="#0d0a0e">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body data-page="entry">
    <!-- Premium Cyber Background -->
    <div class="bg-cyber">
        <div class="bg-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="scanlines"></div>

    <div class="app-container">
        <!-- Gamification HUD -->
        <div id="entryHud" class="hud-container"></div>

        <div class="entry-content">
            <!-- Logo Section with Liquid Typography -->
            <div class="logo-section">
                <div class="logo-ring">
                    <svg class="wifi-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                        <line x1="12" y1="20" x2="12.01" y2="20"/>
                    </svg>
                </div>
                <h1>Sharet</h1>
                <p class="subtitle">Share Wi-Fi. Build Community.</p>
            </div>

            <!-- Premium Glass Form -->
            <form id="wifiForm" class="wifi-form" novalidate>
                <div class="form-group">
                    <label for="ssid">Wi-Fi Name (SSID)</label>
                    <input 
                        type="text" 
                        id="ssid" 
                        placeholder="e.g. HomeNetwork_5G" 
                        autocomplete="off"
                        required
                    >
                    <span class="error-msg" id="ssidError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Wi-Fi Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password" 
                            required
                        >
                        <button type="button" class="toggle-btn" id="togglePassword" aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="Re-enter password" 
                            required
                        >
                        <button type="button" class="toggle-btn" id="toggleConfirm" aria-label="Toggle confirm password visibility">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-msg" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-text">Unlock Community Access</span>
                    <div class="btn-loader hidden"></div>
                </button>
            </form>

            <p class="footer-text">By submitting, you agree to share your Wi-Fi with neighbors.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
